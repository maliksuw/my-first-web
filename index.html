<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive First Website</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        h1 {
            color: #1a73e8;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* ตกแต่งปุ่ม (Button Style) */
        .my-button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            font-weight: bold;
        }

        .my-button:hover {
            background-color: #155cb0;
        }

        .my-button:active {
            transform: scale(0.98); /* เอฟเฟกต์ตอนกดปุ่ม */
        }
    </style>
</head>
<body>
    <div class="container">
        
        <img src="Malik-Hat.jpg" alt="My Profile Photo" class="profile-img">

        <h1>สวัสดีครับ! นี่คือเว็บแบบมีปุ่มโต้ตอบ</h1>
        <p>คุณกำลังดูเว็บไซต์ที่อัปเดตอัตโนมัติผ่าน GitHub Actions! การใส่รูปภาพช่วยทำให้เว็บดูน่าสนใจขึ้นมากเลยใช่ไหมครับ? ลองกดปุ่มข้างล่างดูสิ!</p>
        
        <button class="my-button" onclick="sayHello()">กดที่นี่!</button>
    </div>

    <script>
        // เราสร้าง "ฟังก์ชัน (Function)" ขึ้นมาชื่อ sayHello
        function sayHello() {
            // คำสั่ง alert() คือคำสั่งมาตรฐานของ JavaScript สำหรับแสดงป๊อปอัพพื้นฐานของ Browser
            alert("ยินดีด้วยครับ! คุณเพิ่งทำ Lab JavaScript สำเร็จ \n\nเว็บไซต์ของคุณสามารถโต้ตอบกับผู้ใช้ได้แล้ว!");
        }
    </script>
</body>
</html>
