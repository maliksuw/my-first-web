<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cool First Website with Photo</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        /* ตกแต่งรูปภาพ */
        .profile-img {
            width: 150px; /* กำหนดความกว้าง */
            height: 150px; /* กำหนดความสูง */
            border-radius: 50%; /* ทำเป็นวงกลม */
            object-fit: cover; /* ให้รูปพอดีกับวงกลม */
            border: 5px solid white; /* ขอบขาว */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); /* เงารูป */
            margin-bottom: 20px;
        }

        h1 {
            color: #1a73e8;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .status {
            background-color: #e8f0fe;
            color: #1a73e8;
            padding: 10px;
            font-weight: bold;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <img src="Jabra.png" alt="My Profile Photo" class="profile-img">

        <h1>สวัสดีครับ! เว็บผมมีรูปแล้ว</h1>
        <p>คุณกำลังดูเว็บไซต์ที่อัปเดตอัตโนมัติผ่าน GitHub Actions! การใส่รูปภาพช่วยทำให้เว็บดูน่าสนใจขึ้นมากเลยใช่ไหมครับ?</p>
        <span class="status">CI/CD is Working!</span>
    </div>
</body>
</html>
